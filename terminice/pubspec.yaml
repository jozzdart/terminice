name: terminice
description: "The ultimate toolkit for Dart CLI apps. 30+ ready-to-use components (prompts, searchable selectors, pickers, indicators, editors), 11 universal themes, and zero boilerplate."
version: 0.0.22
homepage: https://github.com/jozzdart/terminice
repository: https://github.com/jozzdart/terminice/tree/main/terminice
issue_tracker: https://github.com/jozzdart/terminice/issues
documentation: https://github.com/jozzdart/terminice/tree/main/terminice#readme
topics:
  - terminal
  - cli
  - prompt
  - terminal-interface
  - terminal-ui

environment:
  sdk: ">=2.17.0 <4.0.0"

platforms:
  linux:
  macos:
  windows:

dependencies:
  terminice_core: ^0.0.15
  intl: ^0.20.0
  time_plus: ^1.3.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0
